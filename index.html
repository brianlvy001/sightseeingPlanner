<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nearby Sightseeing</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Nearby Sightseeing</h1>
    <p class="subtitle">Find top-rated attractions near any address</p>
  </header>

  <main>
    <form id="search-form">
      <input
        id="address-input"
        type="text"
        placeholder="Enter an address or city..."
        autocomplete="off"
        required
      />
      <button type="submit">Find Sights</button>
    </form>
    <div id="status"></div>
    <div id="map-container">
      <iframe id="map-frame" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
