<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore Nearby</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css?v=42" />
</head>
<body>
  <header>
    <h1>Explore Nearby</h1>
    <p class="subtitle">Discover top-rated places within 8 miles of any address</p>
    <div class="view-switcher">
      <button class="view-tab active" data-view="map-route">🗺️ Map Route</button>
      <button class="view-tab" data-view="foodie">🍜 Foodie</button>
    </div>
  </header>

  <main>
    <form id="search-form" class="filter-card">
      <div class="filter-group wide">
        <label for="address-input">📍 Address</label>
        <div class="input-row">
          <input id="address-input" type="text" placeholder="Enter an address or city..." autocomplete="off" required />
          <button id="locate-btn" type="button" title="Use my current location">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
              <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="filter-group">
        <label for="type-select">🔍 Category</label>
        <select id="type-select">
          <optgroup label="🍜 Asian Cuisine">
            <option value="asian_restaurant">Asian Restaurants</option>
            <option value="chinese_restaurant">Chinese Restaurants</option>
            <option value="thai_restaurant">Thai Restaurants</option>
            <option value="japanese_restaurant">Japanese Restaurants</option>
            <option value="vietnamese_restaurant">Vietnamese Restaurants</option>
            <option value="korean_restaurant">Korean Restaurants</option>
          </optgroup>
        </select>
      </div>
      <div class="filter-group" id="map-source-group">
        <label for="map-source">🗺️ Map Source</label>
        <select id="map-source">
          <option value="google">Google Maps</option>
          <option value="osm">OpenStreetMap</option>
        </select>
      </div>
      <div class="filter-group btn-group">
        <label>&nbsp;</label>
        <button type="submit">🔍 Find Places</button>
      </div>
    </form>

    <div id="status"></div>

    <div id="content">
      <div id="carousel-wrap" class="hidden">
        <div class="carousel-header">
          <h2 id="panel-title">Top Places</h2>
          <span id="carousel-counter"></span>
          <button id="fullscreen-btn" class="fullscreen-btn" title="Full screen">&#x2922;</button>
        </div>
        <div id="carousel-track">
          <div id="carousel-clip">
            <div id="places-list"></div>
          </div>
          <button id="carousel-prev" class="carousel-btn" aria-label="Previous">&#10094;</button>
          <button id="carousel-next" class="carousel-btn" aria-label="Next">&#10095;</button>
        </div>
        <div id="scrubber-bar">
          <button id="scr-prev" class="scrubber-arrow" aria-label="Previous">&#10094;</button>
          <div id="scrubber-track">
            <div id="scrubber-thumb"></div>
          </div>
          <button id="scr-next" class="scrubber-arrow" aria-label="Next">&#10095;</button>
        </div>

        <div id="active-info">
          <div id="active-name"></div>
          <div id="active-meta">
            <div class="rating-track"><div class="rating-fill" id="active-fill"></div></div>
            <span class="rating-num" id="active-num"></span>
            <span class="rating-count" id="active-count"></span>
          </div>
          <div id="active-links"></div>
        </div>
      </div>

      <div id="map-container" class="hidden">
        <div id="ph-loading" class="placeholder hidden">
          <div class="pin-wrapper">
            <span class="pin">📍</span>
            <div class="ripple r1"></div>
            <div class="ripple r2"></div>
            <div class="ripple r3"></div>
          </div>
          <p class="ph-title loading-title">Exploring your area...</p>
          <p class="ph-msg">Hold tight! We're scouting the best spots near you.</p>
          <div class="ph-dots"><span></span><span></span><span></span></div>
        </div>
        <div id="ph-error" class="placeholder hidden">
          <div class="ph-scene">
            <span class="crane">🏗️</span>
            <span class="gear g1">⚙️</span>
            <span class="gear g2">⚙️</span>
            <span class="gear g3">⚙️</span>
          </div>
          <p class="ph-title">Engineering in Progress</p>
          <p class="ph-msg" id="ph-msg">Something went wrong. Our engineers are on it!</p>
        </div>
        <div id="map"></div>
        <iframe id="gmap" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>

    <!-- Foodie results -->
    <div id="foodie-wrap" class="hidden">
      <div id="foodie-header">
        <h2 id="foodie-title">Top Places</h2>
        <span id="foodie-count"></span>
      </div>
      <div id="foodie-list"></div>
    </div>
  </main>

  <!-- Route modal -->
  <div id="route-modal" class="route-modal hidden" role="dialog" aria-modal="true">
    <div class="route-dialog">
      <div class="route-header">
        <span class="route-title" id="route-dest-name">Route</span>
        <div class="route-modes">
          <button class="mode-btn active" data-mode="driving"  title="Driving">🚗</button>
          <button class="mode-btn"        data-mode="walking"  title="Walking">🚶</button>
          <button class="mode-btn"        data-mode="transit"  title="Transit">🚌</button>
        </div>
        <button id="route-close" class="route-close" aria-label="Close">&times;</button>
      </div>
      <iframe id="route-frame" allowfullscreen referrerpolicy="no-referrer-when-downgrade" style="display:none"></iframe>
      <div id="route-map" style="display:none"></div>
      <div id="route-info-bar"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js?v=46"></script>
</body>
</html>
